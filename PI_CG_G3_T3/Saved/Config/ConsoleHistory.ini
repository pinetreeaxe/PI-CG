History="import unreal\r\n\r\nmesh = unreal.EditorAssetLibrary.load_asset(\"/Game/Piplup/Piplup.Piplup\")\r\nunreal.log_warning(f\"mesh = {mesh}\")\r\n\r\nif mesh:\r\n    actor = unreal.EditorLevelLibrary.spawn_actor_from_object(\r\n        mesh,\r\n        unreal.Vector(0, 0, 200),\r\n        unreal.Rotator(0, 0, 0)\r\n    )\r\n    unreal.log_warning(f\"actor = {actor}\")\r\n\r\n    if actor:\r\n        actor.set_actor_label(\"TEST_PIPLUP\")\r\n        actor.set_actor_scale3d(unreal.Vector(1, 1, 1))\r\n        unreal.log_warning(\"Spawn OK\")\r\n    else:\r\n        unreal.log_error(\"Spawn falhou\")\r\nelse:\r\n    unreal.log_error(\"Mesh não carregou\")"
History="import unreal\r\nimport random\r\n\r\nrandom.seed(42)\r\n\r\nTREE_PATHS = [\r\n    \"/Game/KiteDemo/Environments/Trees/ScotsPine_01/ScotsPine_01.ScotsPine_01\",\r\n    \"/Game/KiteDemo/Environments/Trees/ScotsPine_2/ScotsPine_2.ScotsPine_2\",\r\n]\r\n\r\nBUSH_PATHS = [\r\n    \"/Game/KiteDemo/Environments/Foliage/Ferns/SM_Fern_01.SM_Fern_01\",\r\n    \"/Game/Fab/Megascans/Plants/Black_Locust_wdvhberja/Medium/wdvhberja_tier_2/StaticMeshes/SM_wdvhberja_VarA.SM_wdvhberja_VarA\",\r\n    \"/Game/Fab/Megascans/Plants/Black_Locust_wdvhberja/Medium/wdvhberja_tier_2/StaticMeshes/SM_wdvhberja_VarC.SM_wdvhberja_VarC\",\r\n]\r\n\r\nROCK_PATHS = [\r\n    \"/Game/KiteDemo/Environments/Rocks/LargePlainsBoulder002/SM_LargePlainsBoulder002.SM_LargePlainsBoulder002\",\r\n    \"/Game/KiteDemo/Environments/Rocks/LargePlainsBoulder3/SM_LargePlainsBoulder3.SM_LargePlainsBoulder3\",\r\n    \"/Game/KiteDemo/Environments/Rocks/LargePlainsBoulder4/SM_LargePlainsBoulder4.SM_LargePlainsBoulder4\",\r\n    \"/Game/KiteDemo/Environments/Rocks/LargePlainsBoulder5/SM_LargePlainsBoulder5.SM_LargePlainsBoulder5\",\r\n    \"/Game/KiteDemo/Environments/Rocks/LargePlainsBoulder6/SM_LargePlainsBoulder6.SM_LargePlainsBoulder6\",\r\n    \"/Game/KiteDemo/Environments/Rocks/LargePlainsBoulder7/SM_LargePlainsBoulder7.SM_LargePlainsBoulder7\",\r\n]\r\n\r\nPIPLUP_PATHS = [\r\n    \"/Game/Piplup/Piplup.Piplup\",\r\n]\r\n\r\nLABEL_PREFIX = \"SC2_\"\r\n\r\ndef load_assets(paths, label):\r\n    out = []\r\n    for p in paths:\r\n        a = unreal.EditorAssetLibrary.load_asset(p)\r\n        unreal.log_warning(f\"[{label}] {p} -> {a}\")\r\n        if a:\r\n            out.append(a)\r\n    return out\r\n\r\ndef spawn(mesh, x, y, z, label, scale=1.0, yaw=None):\r\n    if yaw is None:\r\n        yaw = random.uniform(0, 360)\r\n\r\n    actor = unreal.EditorLevelLibrary.spawn_actor_from_object(\r\n        mesh,\r\n        unreal.Vector(x, y, z),\r\n        unreal.Rotator(0, yaw, 0)\r\n    )\r\n\r\n    unreal.log_warning(f\"spawn {label} -> {actor}\")\r\n\r\n    if actor:\r\n        actor.set_actor_label(label)\r\n        actor.set_actor_scale3d(unreal.Vector(scale, scale, scale))\r\n    return actor\r\n\r\ndef cleanup():\r\n    actor_subsystem = unreal.get_editor_subsystem(unreal.EditorActorSubsystem)\r\n    for actor in actor_subsystem.get_all_level_actors():\r\n        try:\r\n            if actor.get_actor_label().startswith(LABEL_PREFIX):\r\n                actor_subsystem.destroy_actor(actor)\r\n        except:\r\n            pass\r\n\r\ntrees = load_assets(TREE_PATHS, \"TREE\")\r\nbushes = load_assets(BUSH_PATHS, \"BUSH\")\r\nrocks = load_assets(ROCK_PATHS, \"ROCK\")\r\npiplups = load_assets(PIPLUP_PATHS, \"PIPLUP\")\r\n\r\ncleanup()\r\n\r\nif not trees or not bushes or not rocks or not piplups:\r\n    raise RuntimeError(\"Faltam assets. Vê o log.\")\r\n\r\nspawn(random.choice(trees),   -900, -400,   0, f\"{LABEL_PREFIX}Tree_1\", 1.0)\r\nspawn(random.choice(trees),    900,  300,   0, f\"{LABEL_PREFIX}Tree_2\", 1.05)\r\n\r\nspawn(random.choice(rocks),   -200,  850,   0, f\"{LABEL_PREFIX}Rock_1\", 1.0)\r\nspawn(random.choice(rocks),    450, -750,   0, f\"{LABEL_PREFIX}Rock_2\", 1.1)\r\nspawn(random.choice(rocks),   1000,  850,   0, f\"{LABEL_PREFIX}Rock_3\", 0.95)\r\n\r\nspawn(random.choice(bushes),  -700, -250,   0, f\"{LABEL_PREFIX}Bush_1\", 1.0)\r\nspawn(random.choice(bushes),  -850, -520,   0, f\"{LABEL_PREFIX}Bush_2\", 0.9)\r\nspawn(random.choice(bushes),   760,  180,   0, f\"{LABEL_PREFIX}Bush_3\", 1.1)\r\nspawn(random.choice(bushes),   850,  520,   0, f\"{LABEL_PREFIX}Bush_4\", 0.95)\r\nspawn(random.choice(bushes),   300, -650,   0, f\"{LABEL_PREFIX}Bush_5\", 1.0)\r\n\r\nspawn(random.choice(piplups), -760, -360,  20, f\"{LABEL_PREFIX}Piplup_1\", 1.0)\r\nspawn(random.choice(piplups),  780,  320,  20, f\"{LABEL_PREFIX}Piplup_2\", 1.0)\r\nspawn(random.choice(piplups),  430, -700,  20, f\"{LABEL_PREFIX}Piplup_3\", 1.0)\r\nspawn(random.choice(piplups), -180,  820,  2