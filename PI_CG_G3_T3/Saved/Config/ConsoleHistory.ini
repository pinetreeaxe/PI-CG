History="import unreal\r\n\r\n# =========================\r\n# CONFIG\r\n# =========================\r\n\r\nPIPLUP_TARGETS = {\r\n    \"Piplup\":  {\"loc\": unreal.Vector(-560, -420, 110), \"rot\": unreal.Rotator(0, 135, 0), \"scale\": unreal.Vector(2, 2, 2), \"tag\": \"60-80\"},\r\n    \"Piplup2\": {\"loc\": unreal.Vector(-120, -135, 20),  \"rot\": unreal.Rotator(0, 25, 0),  \"scale\": unreal.Vector(2, 2, 2), \"tag\": \"80-90\"},\r\n    \"Piplup3\": {\"loc\": unreal.Vector(140, -40, 15),    \"rot\": unreal.Rotator(0, -30, 0), \"scale\": unreal.Vector(2, 2, 2), \"tag\": \"40-60\"},\r\n    \"Piplup4\": {\"loc\": unreal.Vector(-760, -710, 8),   \"rot\": unreal.Rotator(0, 20, 0),  \"scale\": unreal.Vector(2, 2, 2), \"tag\": \"<20\"},\r\n    \"Piplup5\": {\"loc\": unreal.Vector(520, -210, 42),   \"rot\": unreal.Rotator(0, 210, 0), \"scale\": unreal.Vector(2, 2, 2), \"tag\": \"80-90\"},\r\n    \"Piplup6\": {\"loc\": unreal.Vector(760, -250, 8),    \"rot\": unreal.Rotator(0, 250, 0), \"scale\": unreal.Vector(2, 2, 2), \"tag\": \"60-80\"},\r\n}\r\n\r\nNEW_BUSHES = [\r\n    {\"label\": \"Bush_Auto_LeftRock\",  \"loc\": unreal.Vector(-625, -505, 0), \"rot\": unreal.Rotator(0, 35, 0), \"scale\": unreal.Vector(0.95, 0.95, 0.95)},\r\n    {\"label\": \"Bush_Auto_Center\",    \"loc\": unreal.Vector(90, -60, 0),    \"rot\": unreal.Rotator(0, 15, 0), \"scale\": unreal.Vector(0.85, 0.85, 0.85)},\r\n    {\"label\": \"Bush_Auto_RightRock\", \"loc\": unreal.Vector(500, -170, 30), \"rot\": unreal.Rotator(0, 70, 0), \"scale\": unreal.Vector(0.75, 0.75, 0.75)},\r\n]\r\n\r\nNEW_ROCKS = [\r\n    {\"label\": \"Rock_Auto_CenterRight\", \"loc\": unreal.Vector(310, -120, 0), \"rot\": unreal.Rotator(0, 18, 0), \"scale\": unreal.Vector(0.75, 0.75, 0.75)},\r\n]\r\n\r\nNEW_TREES = [\r\n    {\"label\": \"Tree_Auto_CenterFill\", \"loc\": unreal.Vector(260, -260, 0), \"rot\": unreal.Rotator(0, 95, 0), \"scale\": unreal.Vector(0.9, 0.9, 0.9)},\r\n]\r\n\r\nBUSH_SOURCE_LABEL = \"SM_Fern_01\"\r\nROCK_SOURCE_LABEL = \"SM_LargePlainsBoulder002\"\r\nTREE_SOURCE_LABEL = \"SM_Mobile_Trees\"\r\n\r\n# =========================\r\n# HELPERS\r\n# =========================\r\n\r\ndef all_actors():\r\n    return unreal.EditorLevelLibrary.get_all_level_actors()\r\n\r\ndef actor_label(actor):\r\n    try:\r\n        return actor.get_actor_label()\r\n    except:\r\n        return actor.get_name()\r\n\r\ndef actor_folder(actor):\r\n    try:\r\n        return str(actor.get_folder_path())\r\n    except:\r\n        return \"\"\r\n\r\ndef find_actor(label):\r\n    for actor in all_actors():\r\n        if actor_label(actor) == label:\r\n            return actor\r\n    return None\r\n\r\ndef set_transform(actor, loc, rot, scale):\r\n    actor.set_actor_location(loc, False, True)\r\n    actor.set_actor_rotation(rot, False)\r\n    actor.set_actor_scale3d(scale)\r\n\r\ndef duplicate_actor(source_actor, new_label, loc, rot, scale):\r\n    dup = unreal.EditorLevelLibrary.duplicate_loaded_asset(source_actor)\r\n    if dup:\r\n        return None\r\n    return None\r\n\r\ndef duplicate_level_actor(source_actor, new_label, loc, rot, scale):\r\n    selected = unreal.EditorLevelLibrary.get_selected_level_actors()\r\n    unreal.EditorLevelLibrary.set_selected_level_actors([source_actor])\r\n    unreal.EditorLevelLibrary.duplicate_selected_actors()\r\n    dupes = unreal.EditorLevelLibrary.get_selected_level_actors()\r\n\r\n    new_actor = None\r\n    for a in dupes:\r\n        if a != source_actor:\r\n            new_actor = a\r\n            break\r\n\r\n    if not new_actor:\r\n        return None\r\n\r\n    try:\r\n        new_actor.set_actor_label(new_label)\r\n    except:\r\n        pass\r\n\r\n    try:\r\n        new_actor.set_folder_path(source_actor.get_folder_path())\r\n    except:\r\n        pass\r\n\r\n    set_transform(new_actor, loc, rot, scale)\r\n    return new_actor\r\n\r\n# =========================\r\n# MAIN\r\n# =========================\r\n\r\ndef move_piplups():\r\n    unreal.log(\"Moving Piplups...\")\r\n    for label, data in PIPLUP_TARGETS.items():\r\n        actor = find_actor(label)\r\n        if actor:\r\n            set_transform(actor, data[\"loc\"], data[\"rot\"], data[\"scale\"])\r\n            unreal.log(f\"{label}: moved ({data[\'tag\']})\")\r\n        else:\r\n            unreal.log_warning(f\"{label} not found\")\r\n\r\ndef add_duplicates():\r\n    unreal.log(\"Duplicating support assets...\")\r\n\r\n    bush_source = find_actor(BUSH_SOURCE_LABEL)\r\n    rock_source = find_actor(ROCK_SOURCE_LABEL)\r\n    tree_source = find_actor(TREE_SOURCE_LABEL)\r\n\r\n    if bush_source:\r\n        for item in NEW_BUSHES:\r\n            a = duplicate_level_actor(\r\n                bush_source, item[\"label\"], item[\"loc\"], item[\"rot\"], item[\"scale\"]\r\n            )\r\n            if a:\r\n                try:\r\n                    a.set_folder_path(\"Bushes\")\r\n                except:\r\n                    pass\r\n                unreal.log(f\"Added bush: {item[\'label\']}\")\r\n    else:\r\n        unreal.log_warning(f\"Bush source not found: {BUSH_SOURCE_LABEL}\")\r\n\r\n    if rock_source:\r\n        for item in NEW_ROCKS:\r\n            a = duplicate_level_actor(\r\n                rock_source, item[\"label\"], item[\"loc\"], item[\"rot\"], item[\"scale\"]\r\n            )\r\n            if a:\r\n                try:\r\n                    a.set_folder_path(\"Rocks\")\r\n                except:\r\n                    pass\r\n                unreal.log(f\"Added rock: {item[\'label\']}\")\r\n    else:\r\n        unreal.log_warning(f\"Rock source not found: {ROCK_SOURCE_LABEL}\")\r\n\r\n    if tree_source:\r\n        for item in NEW_TREES:\r\n            a = duplicate_level_actor(\r\n                tree_source, item[\"label\"], item[\"loc\"], item[\"rot\"], item[\"scale\"]\r\n            )\r\n            if a:\r\n                try:\r\n                    a.set_folder_path(\"Trees\")\r\n                except:\r\n                    pass\r\n                unreal.log(f\"Added tree: {item[\'label\']}\")\r\n    else:\r\n        unreal.log_warning(f\"Tree source not found: {TREE_SOURCE_LABEL}\")\r\n\r\ndef run():\r\n    unreal.log(\"=== Scenario 03 auto layout ===\")\r\n    move_piplups()\r\n    add_duplicates()\r\n    unreal.log(\"=== Done ===\")\r\n\r\nrun()"
